name: dem_repair
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy=2.2
  - scipy=1.15
  - matplotlib=3.10
  - pyyaml=6.0
  - tqdm=4.67
  - laspy=2.7
  - lazrs-python=0.8
  - scikit-image=0.25
  - affine=2.4
  - pip:
      # Windows wheels for these two packages were more reliable than the
      # conda-forge builds on this workstation.
      - pillow==12.1.1
      - rasterio==1.4.4
      # Use the CUDA 12.8 PyTorch wheels so training/inference can use the RTX 5090.
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch==2.10.0+cu128
      - torchvision==0.25.0+cu128
